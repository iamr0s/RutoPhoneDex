plugins {
    id 'com.android.application'
}

android {
    namespace 'dex.rutophone'
    compileSdk 35

    defaultConfig {
        applicationId "dex.rutophone"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'io.github.iamr0s:app-process:1.4.1'
}
